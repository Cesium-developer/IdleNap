name: 自动编译安装包

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许上传 Release 文件

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 NSIS
        run: choco install nsis --version 3.09 -y

      - name: 将 NSIS 添加到 PATH
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: 编译卸载程序
        run: makensis installer\Uninstall.nsi

      - name: 移动安装程序
        run: move Uninstall.exe src\Uninstall.exe

      - name: 编译安装程序
        run: makensis installer\Setup.nsi

      - name: 移动安装程序到根目录
        run: move installer\AutoSleep_Setup.exe .\

      - name: 生成 SHA256 校验文件
        shell: pwsh
        run: |
          $exe = ".\AutoSleep_Setup.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "Installer not found: $exe"
            exit 1
          }
          $hash = Get-FileHash -Algorithm SHA256 $exe
          # 仅保存哈希文本，便于用户复制验证或下载校验文件
          $hash.Hash | Out-File -Encoding ASCII -FilePath ".\AutoSleep_Setup.exe.sha256"
          Write-Host "SHA256: $($hash.Hash)"

      - name: 上传到 Release（包含校验）
        uses: softprops/action-gh-release@v3
        with:
          files: |
            AutoSleep_Setup.exe
            AutoSleep_Setup.exe.sha256
